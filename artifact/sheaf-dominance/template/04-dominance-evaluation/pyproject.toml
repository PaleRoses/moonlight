[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sheaf-dominance"
version = "1.0.0"
description = "Source-bound evaluation of class-conditional sheaf orchestration dominance"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "OpenAI"}]
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
sheaf_dominance = ["py.typed"]
