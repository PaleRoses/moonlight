name: Sheaf dominance quick tests

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/sheaf-dominance-quick.yml'
      - 'artifact/sheaf-dominance/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage4-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Assemble and validate documented release surface
        run: bash artifact/sheaf-dominance/assemble_quick_release.sh /tmp/release-root
      - name: Run concise stage-four tests
        env:
          PYTHONPATH: /tmp/release-root/04-dominance-evaluation/src
          RELEASE_ROOT: /tmp/release-root
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/release-root
          python -m unittest discover -s 04-dominance-evaluation/tests -v
